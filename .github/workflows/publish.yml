name: Publish extension

on:
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: publish-marketplace
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify release tag matches package.json version
        id: check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "package.json version: $VERSION / release tag: $GITHUB_REF_NAME (normalized: $TAG_VERSION)"
          if [ "$VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Release tag '$GITHUB_REF_NAME' does not match package.json version '$VERSION'. Bump the version and re-tag."
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Package extension
        run: npx --yes @vscode/vsce package --out "memowl-${{ steps.check.outputs.version }}.vsix"

      - name: Publish to Visual Studio Marketplace
        run: npx --yes @vscode/vsce publish --packagePath "memowl-${{ steps.check.outputs.version }}.vsix"
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Attach VSIX to the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$GITHUB_REF_NAME" "memowl-${{ steps.check.outputs.version }}.vsix" --clobber
